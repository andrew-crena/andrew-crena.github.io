<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Andrew Crena</title>
  <meta name="description" content="A minimal landing page for projects and notes." />
  <meta name="color-scheme" content="dark light" />
  <style>
    :root{
      --bg: #0b0f14;
      --card: rgba(255,255,255,.04);
      --border: rgba(255,255,255,.10);
      --text: rgba(255,255,255,.88);
      --muted: rgba(255,255,255,.62);
      --accent: #9ae6ff;
      --shadow: 0 18px 60px rgba(0,0,0,.40);
      --radius: 18px;
      --max: 980px;
    }
    @media (prefers-color-scheme: light){
      :root{
        --bg:#f7f7fb;
        --card: rgba(0,0,0,.03);
        --border: rgba(0,0,0,.10);
        --text: rgba(0,0,0,.88);
        --muted: rgba(0,0,0,.58);
        --accent:#0b7cff;
        --shadow: 0 18px 60px rgba(0,0,0,.10);
      }
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font: 15.5px/1.55 ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      color:var(--text);
      background: radial-gradient(1200px 700px at 20% -10%, rgba(154,230,255,.16), transparent 55%),
                  radial-gradient(900px 600px at 100% 20%, rgba(108,99,255,.12), transparent 55%),
                  var(--bg);
    }
    a{color:inherit}
    .wrap{max-width:var(--max); margin:0 auto; padding:56px 20px 64px}
    header{display:flex; gap:18px; align-items:flex-start; justify-content:space-between; margin-bottom:34px}
    .title h1{margin:0; font-size:28px; letter-spacing:-0.02em}
    .title p{margin:8px 0 0; color:var(--muted); max-width:56ch}
    .actions{display:flex; gap:10px; flex-wrap:wrap; justify-content:flex-end}
    .btn{
      display:inline-flex; align-items:center; gap:8px;
      padding:10px 12px;
      border:1px solid var(--border);
      border-radius:999px;
      background:transparent;
      text-decoration:none;
      color:var(--text);
      backdrop-filter: blur(10px);
    }
    .btn:hover{border-color: rgba(255,255,255,.22)}
    .grid{
      display:grid;
      grid-template-columns: repeat(12, 1fr);
      gap:14px;
    }
    .panel{
      grid-column: span 12;
      border:1px solid var(--border);
      border-radius: var(--radius);
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .panel-head{
      display:flex; align-items:center; justify-content:space-between; gap:12px;
      padding:14px 16px;
      border-bottom:1px solid var(--border);
    }
    .panel-head h2{margin:0; font-size:14px; letter-spacing:.12em; text-transform:uppercase; color:var(--muted)}
    .search{
      width:min(420px, 100%);
      display:flex; align-items:center; gap:10px;
      padding:10px 12px;
      border:1px solid var(--border);
      border-radius: 999px;
      background: rgba(0,0,0,.06);
    }
    @media (prefers-color-scheme: light){ .search{background: rgba(255,255,255,.6)} }
    .search input{
      width:100%;
      border:0; outline:0; background:transparent;
      color:var(--text);
      font-size:14px;
    }
    .list{padding:10px}
    .item{
      display:flex; align-items:flex-start; justify-content:space-between; gap:12px;
      padding:12px 12px;
      border-radius: 14px;
      text-decoration:none;
    }
    .item:hover{background: rgba(255,255,255,.06)}
    @media (prefers-color-scheme: light){ .item:hover{background: rgba(0,0,0,.05)} }
    .left{min-width:0}
    .name{font-weight:600; letter-spacing:-0.01em}
    .desc{margin-top:4px; color:var(--muted); font-size:13px}
    .tag{
      flex:0 0 auto;
      padding:6px 10px;
      border:1px solid var(--border);
      border-radius:999px;
      font-size:12px;
      color:var(--muted);
      white-space:nowrap;
    }
    footer{margin-top:18px; color:var(--muted); font-size:13px}
    .hint{color:var(--muted); font-size:12.5px; padding:0 16px 14px}
    .mono{font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace}
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="title">
        <h1>Andrew Crena</h1>
          <p>Notes, small tools, and projects.</p>
      </div>
      <div class="actions">
        <a class="btn" href="https://github.com/andrew-crena" target="_blank" rel="noreferrer">GitHub</a>
      </div>
    </header>

    <section class="panel">
      <div class="panel-head">
        <h2>Links</h2>
        <label class="search" aria-label="Search links">
          <span style="color:var(--muted); font-size:13px;">Search</span>
          <input id="q" type="search" placeholder="Type to filter…" autocomplete="off" />
        </label>
      </div>


      <div class="list" id="list"></div>
    </section>

    <footer>
      <span id="count"></span>
    </footer>
  </div>

<script>
  const listEl = document.getElementById('list');
  const qEl = document.getElementById('q');
  const countEl = document.getElementById('count');

  const items = [
    {
      title: "My Digital Garden",
      description: "Notes and ideas in progress.",
      href: "https://andrew-crena.github.io/my-digital-garden/",
      label: "garden"
    },
    {
      title: "Not Quite My Tempo",
      description: "Music / rhythm-related experiments.",
      href: "https://andrew-crena.github.io/not-quite-my-tempo/",
      label: "project"
    }
  ];

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, m => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[m]));
  }

  function render(filter=""){
    const f = filter.trim().toLowerCase();
    const filtered = !f ? items : items.filter(it =>
      (it.title||"").toLowerCase().includes(f) ||
      (it.description||"").toLowerCase().includes(f) ||
      (it.label||"").toLowerCase().includes(f)
    );

    listEl.innerHTML = filtered.map(it => `
      <a class="item" href="${escapeHtml(it.href)}">
        <div class="left">
          <div class="name">${escapeHtml(it.title)}</div>
          ${it.description ? `<div class="desc">${escapeHtml(it.description)}</div>` : ``}
        </div>
        <div class="tag">${escapeHtml(it.label || "link")}</div>
      </a>
    `).join("");

    countEl.textContent = `${filtered.length} link${filtered.length===1?"":"s"}`;
  }

  qEl.addEventListener('input', e => render(e.target.value));
  render();
  </script>
</body>
</html>
